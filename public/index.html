<!DOCTYPE html>
<html lang="en">
<head>
	<meta charset="UTF-8">
	<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover">
	<meta name="apple-mobile-web-app-capable" content="yes">
	<meta name="mobile-web-app-capable" content="yes">
	<title>Heaps Starter</title>
	<style>
		* { margin: 0; padding: 0; box-sizing: border-box; }
		html, body { width: 100%; height: 100%; overflow: hidden; background: #000; position: fixed; top: 0; left: 0; }
		#webgl { display: block; width: 100%; height: 100%; outline: none; touch-action: none; }
	</style>
</head>
<body>
	<canvas id="webgl"></canvas>
	<script>
		// Set canvas to exact viewport pixel size so Heaps' ResizeObserver
		// picks up the correct dimensions immediately and on every resize.
		var resizeRaf = null;
		function fixViewport() {
			var canvas = document.getElementById('webgl');
			var w = window.innerWidth;
			var h = window.innerHeight;
			canvas.style.width  = w + 'px';
			canvas.style.height = h + 'px';
		}
		window.addEventListener('resize', function() {
			fixViewport();
			if (resizeRaf) cancelAnimationFrame(resizeRaf);
			resizeRaf = requestAnimationFrame(function() {
				fixViewport();
				resizeRaf = null;
			});
		});
		window.addEventListener('orientationchange', function() {
			fixViewport();
			if (resizeRaf) cancelAnimationFrame(resizeRaf);
			resizeRaf = requestAnimationFrame(function() {
				fixViewport();
				resizeRaf = null;
			});
		});
		fixViewport();
	</script>
	<script src="game.js"></script>
</body>
</html>
